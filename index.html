<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Nine</title>
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:Inter;background:#050505;color:#fff;overflow-x:hidden}

/* --- LOADER --- */
#loader{
 position:fixed;top:0;left:0;width:100%;height:100%;
 background:#050505;display:flex;align-items:center;justify-content:center;
 z-index:9999;flex-direction:column;
}
#loader h1{
 font-family:'Uncial Antiqua', cursive;
 font-size:4rem;
 letter-spacing:5px;
 opacity:0;
 animation:fadeIn 2s forwards;
}
@keyframes fadeIn{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}

/* --- Контент сайта --- */
#content{opacity:0;transition:opacity 1.2s ease-in}

/* --- рамки --- */
body::before, body::after{
 content:"";position:fixed;inset:10px;border:1px solid #111;pointer-events:none;
}
body::after{inset:20px;border:1px solid #1a1a1a;opacity:.5}

/* header */
header{position:fixed;top:0;width:100%;background:#000a;padding:20px 40px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #111;z-index:100}
header h1{letter-spacing:3px;font-size:16px;}
nav a{color:#777;margin:0 10px;text-decoration:none;font-size:14px;transition:.3s}
nav a:hover{color:#fff}
nav .center-link{margin:auto;font-size:14px;font-weight:600;cursor:pointer;}

/* hero */
.hero{height:100vh;display:flex;align-items:center;justify-content:center;position:relative}
.hero h2{letter-spacing:6px;font-size:2.5rem}

/* секция */
.section{padding:120px 40px;max-width:1400px;margin:auto}

/* сетка */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
@media(max-width:1000px){.grid{grid-template-columns:repeat(2,1fr)}}

/* карточка */
.card{
 cursor:pointer;background:#0d0d0d;border-radius:10px;overflow:hidden;
 border:1px solid #111;transition:.3s;position:relative;
}
.card:hover{transform:scale(1.04);border-color:#333}

/* фотки */
.card img{
 width:100%;
 height:260px;
 object-fit:cover;
 transition:.6s;
 filter:brightness(1);
}

/* блик */
.card::after{
 content:"";
 position:absolute;
 inset:0;
 background:linear-gradient(120deg,transparent,rgba(255,255,255,0.08),transparent);
 opacity:0;
 transition:.4s;
}
.card:hover::after{opacity:1}

.price{padding:10px;color:#888}

/* modal */
.modal{
 position:fixed;top:0;left:0;width:100%;height:100%;
 background:#000f;display:none;align-items:center;justify-content:center;
 z-index:200;
}
.modal-content{
 background:#0d0d0d;padding:20px;border-radius:20px;width:90%;max-width:500px;
}
.modal img{
 width:100%;height:300px;object-fit:cover;cursor:zoom-in;
}

.close{cursor:pointer;color:#888;margin-bottom:10px}

.sizes span{
 border:1px solid #333;padding:5px 10px;margin:5px;
 display:inline-block;cursor:pointer;
}

button{margin-top:10px;padding:10px;width:100%;border:none;background:#fff;color:#000;cursor:pointer}

/* FULL IMAGE */
.fullImageModal{
 position:fixed;top:0;left:0;width:100%;height:100%;
 background:#000;display:none;align-items:center;justify-content:center;
 z-index:999;
 animation:fade .3s;
}
.fullImageModal img{
 max-width:95%;
 max-height:95%;
 object-fit:contain;
 animation:zoom .3s;
}

@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes zoom{from{transform:scale(.8)}to{transform:scale(1)}}

footer{padding:40px;text-align:center;color:#333}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader"><h1>NUMBER NINE</h1></div>

<div id="content">

<header>
<h1>NUMBER NINE</h1>
<nav>
<a href="#home">Home</a>
<a href="#gallery">Gallery</a>
<span class="center-link" onclick="window.location='gallery2.html'">Special</span>
</nav>
</header>

<section id="home" class="hero">
<h2>ARCHIVE / DARK / NINE</h2>
</section>
<section id="gallery" class="section">
  <!-- надпись POPULAR -->
  <h2 style="text-align:center;margin-bottom:30px;font-size:2rem;letter-spacing:3px;">POPULAR</h2>

  <div class="grid">

    <div class="card" onclick="openModal('photo1.jpg','$120')"><img src="photo1.jpg"><div class="price">$120</div></div>
    <div class="card" onclick="openModal('photo2.jpg','$90')"><img src="photo2.jpg"><div class="price">$90</div></div>
    <div class="card" onclick="openModal('photo3.jpg','$150')"><img src="photo3.jpg"><div class="price">$150</div></div>
    <div class="card" onclick="openModal('photo4.jpg','$110')"><img src="photo4.jpg"><div class="price">$110</div></div>

    <div class="card" onclick="openModal('photo5.jpg','$130')"><img src="photo5.jpg"><div class="price">$130</div></div>
    <div class="card" onclick="openModal('photo6.jpg','$80')"><img src="photo6.jpg"><div class="price">$80</div></div>
    <div class="card" onclick="openModal('photo7.jpg','$140')"><img src="photo7.jpg"><div class="price">$140</div></div>
    <div class="card" onclick="openModal('photo8.jpg','$95')"><img src="photo8.jpg"><div class="price">$95</div></div>

    <div class="card" onclick="openModal('photo9.jpg','$170')"><img src="photo9.jpg"><div class="price">$170</div></div>
    <div class="card" onclick="openModal('photo10.jpg','$75')"><img src="photo10.jpg"><div class="price">$75</div></div>
    <div class="card" onclick="openModal('photo11.jpg','$105')"><img src="photo11.jpg"><div class="price">$105</div></div>
    <div class="card" onclick="openModal('photo12.jpg','$160')"><img src="photo12.jpg"><div class="price">$160</div></div>

  </div>
</section>

<!-- modal -->
<div class="modal" id="modal">
<div class="modal-content">
<div class="close" onclick="closeModal()">✕ Закрыть</div>
<img id="modalImg" onclick="openFullImage()">
<h3 id="modalPrice"></h3>
<div class="sizes">
<p>Размеры:</p>
<span onclick="selectSize(this)">S</span>
<span onclick="selectSize(this)">M</span>
<span onclick="selectSize(this)">L</span>
<span onclick="selectSize(this)">XL</span>
</div>
<button onclick="buyItem()">Купить</button>
</div>
</div>

<!-- full screen image -->
<div class="fullImageModal" id="fullImageModal" onclick="closeFullImage()">
<img id="fullImage">
</div>

<footer>© 2026 Number Nine Archive</footer>
</div>

<script>
window.addEventListener('load',()=>{
 const loader=document.getElementById('loader');
 const content=document.getElementById('content');
 setTimeout(()=>{loader.style.display='none';content.style.opacity='1';},1500);
});

let selectedSize='';
function openModal(img,price){
 document.getElementById('modal').style.display='flex';
 document.getElementById('modalImg').src=img;
 document.getElementById('modalPrice').innerText=price;
 selectedSize=''; resetSizes();
}
function closeModal(){document.getElementById('modal').style.display='none'}
function selectSize(el){resetSizes(); el.style.background='#fff'; el.style.color='#000'; selectedSize=el.innerText;}
function resetSizes(){document.querySelectorAll('.sizes span').forEach(s=>{s.style.background='transparent';s.style.color='#fff';});}
function buyItem(){if(!selectedSize){alert('Выбери размер 😤');return;} alert('Ой 😱');}

function openFullImage(){
 const src=document.getElementById('modalImg').src;
 document.getElementById('fullImage').src=src;
 document.getElementById('fullImageModal').style.display='flex';
}
function closeFullImage(){document.getElementById('fullImageModal').style.display='none'}
</script>

</body>
</html>
